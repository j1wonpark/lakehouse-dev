# MinIO - Standalone mode for local development
# Helm chart: https://github.com/minio/minio/tree/master/helm/minio

mode: standalone

replicas: 1

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi

rootUser: minioadmin
rootPassword: minioadmin

persistence:
  enabled: true
  size: 10Gi

buckets:
  - name: warehouse
    policy: none
    purge: false

consoleIngress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - minio.localhost

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - minio-api.localhost
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
