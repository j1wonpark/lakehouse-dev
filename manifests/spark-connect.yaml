apiVersion: spark.apache.org/v1
kind: SparkApplication
metadata:
  name: spark-connect-server
  namespace: spark
spec:
  mainClass: "org.apache.spark.sql.connect.service.SparkConnectServer"
  sparkConf:
    # --- Spark Connect ---
    spark.scheduler.mode: "FAIR"

    # --- Kubernetes ---
    spark.kubernetes.container.image: "localhost/spark-dev:latest"
    spark.kubernetes.container.image.pullPolicy: "Never"
    spark.kubernetes.authenticate.driver.serviceAccountName: "spark"
    spark.kubernetes.executor.podNamePrefix: "spark-connect"

    # --- Resources ---
    spark.driver.memory: "1g"
    spark.executor.memory: "1g"
    spark.executor.cores: "1"

    # --- Dynamic allocation ---
    spark.dynamicAllocation.enabled: "true"
    spark.dynamicAllocation.shuffleTracking.enabled: "true"
    spark.dynamicAllocation.minExecutors: "1"
    spark.dynamicAllocation.maxExecutors: "3"

    # --- S3 / MinIO (Iceberg native S3FileIO) ---
    spark.sql.catalog.polaris.io-impl: "org.apache.iceberg.aws.s3.S3FileIO"
    spark.sql.catalog.polaris.s3.endpoint: "http://minio.minio.svc.cluster.local:9000"
    spark.sql.catalog.polaris.s3.access-key-id: "minioadmin"
    spark.sql.catalog.polaris.s3.secret-access-key: "minioadmin"
    spark.sql.catalog.polaris.s3.path-style-access: "true"

    # --- Iceberg + Polaris REST Catalog ---
    spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    spark.sql.catalog.polaris: "org.apache.iceberg.spark.SparkCatalog"
    spark.sql.catalog.polaris.type: "rest"
    spark.sql.catalog.polaris.uri: "http://polaris.polaris.svc.cluster.local:8181/api/catalog"
    spark.sql.catalog.polaris.warehouse: "spark_catalog"
    spark.sql.catalog.polaris.scope: "POLARIS"
    spark.sql.catalog.polaris.credential: "root:s3cr3t"
    spark.sql.catalog.polaris.header.X-Iceberg-Access-Delegation: "vended-credentials"
    spark.sql.defaultCatalog: "polaris"

  applicationTolerations:
    resourceRetainPolicy: Always
    restartConfig:
      restartPolicy: Always
      maxRestartAttempts: 10
      restartBackoffMillis: 30000

  runtimeVersions:
    sparkVersion: "4.1.2-SNAPSHOT"
